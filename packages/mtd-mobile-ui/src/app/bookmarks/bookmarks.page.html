<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Bookmarks</ion-title>
    @if ($bookmarks | async; as bookmarks) {
      <ion-buttons slot="end">
        @if (bookmarks.length > 0) {
          <ion-button
            ion-button
            (click)="edit = !edit"
            >
            @if (!edit) {
              <ion-icon name="trash"></ion-icon>
            }
            @if (edit) {
              <span>cancel</span>
            }
          </ion-button>
        }
      </ion-buttons>
    }
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">bookmarks</ion-title>
    </ion-toolbar>
  </ion-header>
  @if ($bookmarks | async; as bookmarks) {
    <div>
      <mtd-entry-list [entries]="bookmarks" [parentEdit]="edit"></mtd-entry-list>
      <div class="center">
        @if (edit) {
          <ion-button
            color="danger"
            class="remove"
            (click)="removeEntries()"
            >Remove selected bookmarks</ion-button
            >
          }
        </div>
      </div>
    }
  </ion-content>
