<div class="browseElements">
  @if (entries.length > 0) {
    <ion-list>
      @if ($entriesHash | async; as entriesHash) {
        <div>
          @for (entry of entryIDS; track entry) {
            <ion-item
              class="matchContainer"
              (click)="showModal(entriesHash[entry])"
              text-wrap
              >
              @if (edit) {
                <ion-checkbox
                  color="danger"
                  [checked]="entriesHash[entry]['checked']"
                ></ion-checkbox>
              }
              <ion-label>
                <div class="langMatched matchLeftContainer">
                  <span class="langMatched response browseL1">{{
                    entriesHash[entry].word
                  }}</span>
                </div>
                <div class="matchRightContainer">
                  <span class="response matchRightDiv">{{
                    entriesHash[entry].definition
                  }}</span>
                </div>
              </ion-label>
            </ion-item>
          }
        </div>
      }
    </ion-list>
  }
  <ion-modal [isOpen]="isModalOpen" (didDismiss)="didDismiss()">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title></ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="isModalOpen = false">Close</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <mtd-entry [entry]="modalEntry"></mtd-entry>
      </ion-content>
    </ng-template>
  </ion-modal>
</div>
