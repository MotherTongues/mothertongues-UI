<mtd-single>
  <div title class="centered random-header">
    <button
      title
      class="accent-contrast"
      mat-raised-button
      color="accent"
      (click)="getRandom()"
      >
      {{ 'mtd.pages.random.button' | translate }}
    </button>
  </div>
  @if (show || entries$) {
    <div class="results">
      <mtd-entry-list [entries]="entries$ | async"></mtd-entry-list>
    </div>
  }
</mtd-single>
