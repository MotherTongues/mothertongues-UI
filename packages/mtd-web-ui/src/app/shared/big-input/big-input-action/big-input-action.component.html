<button
  mat-raised-button
  color="color"
  [disabled]="disabled"
  (click)="onClick()"
  >
  @if (fontSet && fontIcon && !faIcon) {
    <mat-icon
      [fontSet]="fontSet"
      [fontIcon]="fontIcon"
    ></mat-icon>
  }
  @if (faIcon) {
    <fa-icon [icon]="faIcon"></fa-icon>
  }
  @if (label) {
    <span>{{ label }}</span>
  }
</button>
